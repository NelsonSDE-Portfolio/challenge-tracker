[build]
  command = "npm run build"
  publish = "dist"

# Edge function for CORS headers
[[edge_functions]]
  path = "/assets/*"
  function = "cors"

[[edge_functions]]
  path = "/*.js"
  function = "cors"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
